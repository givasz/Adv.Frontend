# Deploy do frontend (Vite/React) no Netlify.
# Variáveis de ambiente ficam em Site settings → Environment variables:
#   VITE_API_URL       = https://<seu-backend>.onrender.com   (backend no Render)
#   VITE_USE_REAL_API  = true   (opcional; sem isso, perfis ficam no localStorage
#                                e só a geração de bio usa o backend)

[build]
  base = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# React Router: qualquer rota cai no index.html (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
